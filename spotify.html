<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playlists — Unlearning Chairs</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --border:    #222222;
      --accent-1:  #4cd4e0;
      --accent-2:  #1c1b1b;
      --accent-3:  #6e6656;
      --accent-4:  #b5b4b3;
      --accent-5:  #e8e7e6;
      --accent-6:  #806b63;
      --text:      #f0f0f0;
      --muted:     #888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: url('unlearningchairs.jpg') center center / cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Syne Mono', monospace;
      color: var(--text);
      padding: 32px 16px;
    }



    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(30,215,85,.05) 0%, transparent 70%);
      pointer-events: none;
    }

    header {
      margin-bottom: 40px;
      text-align: center;
      position: relative;
      z-index: 1;
      opacity: 0;
      animation: slideUp 0.5s cubic-bezier(.22,1,.36,1) 0s forwards;
    }

    header h1 {
      font-size: clamp(1.8rem, 6vw, 3.5rem);
      font-family: 'Syne Mono', monospace;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    header h1 a {
      color: inherit;
      text-decoration: none;
    }

    header h1 a:hover {
      opacity: 0.8;
    }

    header span {
      display: block;
      font-family: 'Syne Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 8px;
    }

    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: min(400px, 100%);
      position: relative;
      z-index: 1;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 16px 20px;
      background: rgba(10,10,10,0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      overflow: hidden;
      text-align: left;
      text-decoration: none;
      color: var(--text);
      font-family: 'Syne Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: transform 0.18s cubic-bezier(.22,1,.36,1),
                  border-color 0.18s ease,
                  box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      transform: translateX(-101%);
      transition: transform 0.32s cubic-bezier(.22,1,.36,1);
    }

    .btn:hover::before  { transform: translateX(0); }
    .btn:active         { transform: scale(0.97); }

    .btn::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 4px 0 0 4px;
    }

    .btn-label {
      position: relative;
      z-index: 1;
      flex: 1;
    }

    .btn-arrow {
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.2s, transform 0.2s;
      font-size: 18px;
    }

    .btn:hover .btn-arrow { opacity: 1; transform: translateX(0); }

    /* Per-button accents */
    .btn-1::after    { background: var(--accent-1); }
    .btn-1:hover     { border-color: var(--accent-1); box-shadow: 0 0 28px rgba(232,255,71,.18); }
    .btn-1::before   { background: rgba(232,255,71,.07); }
    .btn-1 .btn-arrow { color: var(--accent-1); }

    .btn-2::after    { background: var(--accent-2); }
    .btn-2:hover     { border-color: var(--accent-2); box-shadow: 0 0 28px rgba(255,71,87,.18); }
    .btn-2::before   { background: rgba(255,71,87,.07); }
    .btn-2 .btn-arrow { color: var(--accent-2); }

    .btn-3::after    { background: var(--accent-3); }
    .btn-3:hover     { border-color: var(--accent-3); box-shadow: 0 0 28px rgba(0,212,255,.18); }
    .btn-3::before   { background: rgba(0,212,255,.07); }
    .btn-3 .btn-arrow { color: var(--accent-3); }

    .btn-4::after    { background: var(--accent-4); }
    .btn-4:hover     { border-color: var(--accent-4); box-shadow: 0 0 28px rgba(191,111,255,.18); }
    .btn-4::before   { background: rgba(191,111,255,.07); }
    .btn-4 .btn-arrow { color: var(--accent-4); }

    .btn-5::after    { background: var(--accent-5); }
    .btn-5:hover     { border-color: var(--accent-5); box-shadow: 0 0 28px rgba(255,159,67,.18); }
    .btn-5::before   { background: rgba(255,159,67,.07); }
    .btn-5 .btn-arrow { color: var(--accent-5); }

    .btn-6::after    { background: var(--accent-6); }
    .btn-6:hover     { border-color: var(--accent-6); box-shadow: 0 0 28px rgba(255,159,67,.18); }
    .btn-6::before   { background: rgba(255,159,67,.07); }
    .btn-6 .btn-arrow { color: var(--accent-6); }
    
    /* Instagram button */
    .btn-instagram {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: min(400px, 100%);
      padding: 13px 20px;
      background: transparent;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      color: var(--muted);
      font-family: 'Syne Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      position: relative;
      z-index: 1;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      animation: slideUp 0.5s cubic-bezier(.22,1,.36,1) 0.6s forwards;
    }

    .btn-instagram:hover {
      color: #fff;
      border-color: #e1306c;
      box-shadow: 0 0 20px rgba(225,48,108,.2);
    }

    .btn-instagram svg {
      width: 15px;
      height: 15px;
      fill: currentColor;
      flex-shrink: 0;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn { opacity: 0; animation: slideUp 0.5s cubic-bezier(.22,1,.36,1) forwards; }
    .btn-1 { animation-delay: 0.05s; }
    .btn-2 { animation-delay: 0.15s; }
    .btn-3 { animation-delay: 0.25s; }
    .btn-4 { animation-delay: 0.35s; }
    .btn-5 { animation-delay: 0.45s; }
    .btn-6 { animation-delay: 0.55s; }
    
    @media (hover: none) {
      .btn-arrow { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

  <header>
    <h1><a href="index.html">Unlearning Chairs</a></h1>
    <span>Playlists curated by Hizryan Kodar</span>
